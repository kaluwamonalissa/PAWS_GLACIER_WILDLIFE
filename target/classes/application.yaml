spring:
  application:
    name: paws
  datasource:
    url: jdbc:h2:mem:pawsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

paws:
  jwt:
    secret: paws-hwange-secret-key-2026-very-long-secret-for-hmac256-signing
  uploads:
    dir: uploads

server:
  port: 8080
